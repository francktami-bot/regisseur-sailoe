<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Régiesseur Photo — Sailoé</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1923;--card:#1a2535;--bd:#2a3a50;--bl:#3b82f6;--gr:#10b981;--tx:#e2e8f0;--mu:#64748b;--rd:#ef4444}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;padding-bottom:90px}
header{background:var(--card);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700}
header p{font-size:11px;color:var(--mu)}
.badge{background:var(--bl);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:8px}
.wrap{padding:14px;max-width:500px;margin:0 auto}
.screen{display:none}.screen.on{display:block}
.btn{width:100%;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px;margin-bottom:10px}
.btn:active{opacity:.8}
.bl{background:var(--bl);color:#fff}
.gr{background:var(--gr);color:#fff}
.gh{background:#1e2d3d;color:var(--tx);border:1px solid var(--bd)}
.row{display:flex;gap:10px}.row .btn{margin-bottom:0}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer}
.card:active{opacity:.8}
.card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.card p{font-size:12px;color:var(--mu)}
.card .prog{font-size:11px;color:var(--gr);margin-top:6px;font-weight:700}
.q-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
.q-card:active{opacity:.8}
.q-card .q-id{font-size:11px;color:var(--bl);font-weight:700;margin-bottom:4px}
.q-card .q-text{font-size:13px;line-height:1.4}
.q-card .q-progress{font-size:11px;color:var(--mu);margin-top:6px}
.q-card.done .q-progress{color:var(--gr)}
.p-card{background:var(--card);border:2px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
.p-card:active{opacity:.8}
.p-card.done{border-color:var(--gr)}
.p-card .p-id{font-size:11px;color:var(--mu);font-weight:700;font-family:monospace}
.p-card .p-usage{font-size:13px;font-weight:700;margin:4px 0}
.p-card .p-desc{font-size:12px;color:var(--mu);line-height:1.4}
.p-card .p-status{font-size:11px;margin-top:6px;font-weight:700}
.p-card.done .p-status{color:var(--gr)}
.p-card:not(.done) .p-status{color:var(--mu)}
video{width:100%;border-radius:12px;background:#000;margin-bottom:10px}
#snapCanvas{display:none}
#previewImg{width:100%;border-radius:12px;margin-bottom:10px;display:none}
.info-box{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px}
.info-box .label{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-box .value{font-size:14px;font-weight:700}
.info-box .sub{font-size:12px;color:var(--mu);margin-top:2px}
.auth-box{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:14px}
.auth-box .ico{font-size:44px;margin-bottom:12px}
.auth-box h2{font-size:17px;font-weight:700;margin-bottom:8px}
.auth-box p{font-size:13px;color:var(--mu);line-height:1.5;margin-bottom:20px}
.err{color:#ef4444;font-size:12px;text-align:center;margin:6px 0;min-height:16px}
.back-btn{background:none;border:none;color:var(--bl);font-size:14px;font-weight:700;cursor:pointer;padding:4px 0;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.upload-box{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:14px}
.upload-box .ico{font-size:44px;margin-bottom:10px}
.upload-box h2{font-size:17px;font-weight:700;margin-bottom:6px}
.upload-box p{font-size:13px;color:var(--mu)}
</style>
</head>
<body>
<header>
  <div>
    <h1>Régiesseur Photo <span class="badge">v2.0</span></h1>
    <p>Sailoé — Lagoon 42</p>
  </div>
</header>

<div id="screen-auth" class="screen wrap">
  <div class="auth-box">
    <div class="ico">☁️</div>
    <h2>Connexion Google Drive</h2>
    <p>Pour envoyer les photos directement dans les bons dossiers Drive, connecte ton compte Google.</p>
    <button class="btn bl" onclick="connectGoogle()">Se connecter avec Google</button>
  </div>
</div>

<div id="screen-themes" class="screen wrap">
  <div id="themes-list"></div>
</div>

<div id="screen-questions" class="screen wrap">
  <button class="back-btn" onclick="show('screen-themes')">‹ Thématiques</button>
  <div id="questions-list"></div>
</div>

<div id="screen-photos" class="screen wrap">
  <button class="back-btn" onclick="show('screen-questions')">‹ Questions</button>
  <div id="p-title" style="font-size:13px;color:var(--mu);margin-bottom:4px"></div>
  <div id="p-sub" style="font-size:15px;font-weight:700;margin-bottom:14px"></div>
  <div id="photos-list"></div>
</div>

<div id="screen-camera" class="screen wrap">
  <button class="back-btn" onclick="backToPhotos()">‹ Photos</button>
  <div class="info-box">
    <div class="label">Photo en cours</div>
    <div class="value" id="cam-photo-id"></div>
    <div class="sub" id="cam-photo-usage"></div>
    <div class="sub" id="cam-photo-desc" style="margin-top:4px;font-style:italic"></div>
  </div>
  <video id="vid" autoplay playsinline></video>
  <canvas id="snapCanvas"></canvas>
  <img id="previewImg" alt="aperçu">
  <div class="err" id="errCam"></div>
  <div id="cam-actions-shoot" class="row">
    <button class="btn gh" onclick="switchCam()">↻</button>
    <button class="btn bl" onclick="doSnap()">📸 Prendre</button>
  </div>
  <div id="cam-actions-preview" style="display:none">
    <div class="row" style="margin-bottom:10px">
      <button class="btn gh" onclick="retake()">↩ Reprendre</button>
      <button class="btn gr" id="btn-send" onclick="sendPhoto()">☁️ Envoyer</button>
    </div>
  </div>
  <div id="upload-status" style="font-size:12px;text-align:center;min-height:18px;margin-top:4px"></div>
</div>

<div id="screen-success" class="screen wrap">
  <div class="upload-box">
    <div class="ico">✅</div>
    <h2>Photo envoyée !</h2>
    <p id="success-msg"></p>
  </div>
  <button class="btn bl" onclick="afterSuccess()">Photo suivante</button>
  <button class="btn gh" onclick="show('screen-themes')">‹ Accueil</button>
</div>

<script>
const CLIENT_ID='75307320621-k7dav48gmda852ij5nievpcr3ullvfik.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const DRIVE_FOLDERS={
  'T0_Check_In_Out':'1dNjjmG47xPg11BBDZOCbVVl2izl-NJj_',
  'T2_Energie':'1qx1gyyNh_x_HwjHGIJK1CNhjjtqZuthE',
  'T3_Moteurs':'1TNcuQfLs40wt2bSquE_-l8tiXo3wuLfP',
  'T4_Annexe_Moteur':'112cD1ovJJiS7xtdpash2FRbKT9Ne16tN',
  'T5_Annexe_Mise_a_Leau':'1CrKmK9VBdXd-f2trbwsIro4Sc4Tl4Kz9',
  'T6_Eau_Douce':'1LPSnRXDL2euaJrnfHSKWV-3Z76WqA4FL',
  'T7_Instruments':'1PtPu1JCPdgvNU1LAvFm9myI7OqVDDB19',
  'T8_Mouillage':'1qIiXY5y7K-kHbPpeXVK3ufiyAO2QWtR1',
  'T9_Securite':'1QagjuJO8tdJGzu-PDyLPGcFeTqKsMs72',
  'T10_Divers':'1AS5YhK1RqlwcWJlP9jafOlnNpmD2_wH0'
};
const PHOTOS=[{"thematique":"T2_Energie","id_question":"L42-T2-Q2","type_question":"Diagnostic","question":"Il n'y a plus de 220V / courant alternatif à bord — que faire ?","id_photo":"L42-T2-Q2-P1","usage":"Situation initiale — vérification voyant","description":"Convertisseur « Inverter » sur le tableau électrique, voyant rouge allumé visible","type_photo":"Plan large","cadrage":"Vue ensemble"},{"thematique":"T2_Energie","id_question":"L42-T2-Q2","type_question":"Diagnostic","question":"Il n'y a plus de 220V / courant alternatif à bord — que faire ?","id_photo":"L42-T2-Q2-C1","usage":"Action — appuyer sur le bouton","description":"Main appuyant sur le bouton du convertisseur « Inverter »","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q2","type_question":"Diagnostic","question":"Il n'y a plus de 220V / courant alternatif à bord — que faire ?","id_photo":"L42-T2-Q2-C2","usage":"Vérification — écran 220V","description":"Écran du convertisseur affichant 220V","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q2","type_question":"Diagnostic","question":"Il n'y a plus de 220V / courant alternatif à bord — que faire ?","id_photo":"L42-T2-Q2-C3","usage":"Action corrective — disjoncteur coursive tribord","description":"Main réenclenche le disjoncteur dans la coursive tribord","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q2","type_question":"Diagnostic","question":"Il n'y a plus de 220V / courant alternatif à bord — que faire ?","id_photo":"L42-T2-Q2-C4","usage":"État résolu — prise fonctionnelle","description":"Prise avec appareil branché, chargement actif visible","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q3","type_question":"Diagnostic","question":"Le frigo ou congélateur ne fonctionne plus — que faire ?","id_photo":"L42-T2-Q3-C1","usage":"Vérification initiale — bouton groupe 3 fridge unit","description":"Bouton groupe 3 fridge unit sur le tableau électrique — voyant rouge allumé","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q3","type_question":"Diagnostic","question":"Le frigo ou congélateur ne fonctionne plus — que faire ?","id_photo":"L42-T2-Q3-C2","usage":"Vérification molette frigo","description":"Molette de puissance à l'intérieur du frigo en position 7","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q3","type_question":"Diagnostic","question":"Le frigo ou congélateur ne fonctionne plus — que faire ?","id_photo":"L42-T2-Q3-C3","usage":"Vérification molette congélateur","description":"Molette de puissance à l'intérieur du congélateur en position max","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q3","type_question":"Diagnostic","question":"Le frigo ou congélateur ne fonctionne plus — que faire ?","id_photo":"L42-T2-Q3-C4","usage":"Vérification bouton frigo extérieur","description":"Bouton frigo extérieur sur le bateau — position allumée","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q14","type_question":"Diagnostic","question":"Comment brancher le bateau au quai et vérifier que le 220V fonctionne ?","id_photo":"L42-T2-Q14-P1","usage":"Action — branchement câble sur le quai","description":"Main tenant le câble, prise descendue vers le quai sans toucher l'eau","type_photo":"Plan large","cadrage":"Vue ensemble"},{"thematique":"T2_Energie","id_question":"L42-T2-Q14","type_question":"Diagnostic","question":"Comment brancher le bateau au quai et vérifier que le 220V fonctionne ?","id_photo":"L42-T2-Q14-C1","usage":"Vérification compatibilité connectique","description":"Connectique câble et prise quai — compatibilité visible","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q14","type_question":"Diagnostic","question":"Comment brancher le bateau au quai et vérifier que le 220V fonctionne ?","id_photo":"L42-T2-Q14-C2","usage":"Vérification écran 220 — aiguille OK","description":"Écran 220 du tableau électrique — aiguille sur 220","type_photo":"Close-up","cadrage":"Frontal serré"},{"thematique":"T2_Energie","id_question":"L42-T2-Q14","type_question":"Diagnostic","question":"Comment brancher le bateau au quai et vérifier que le 220V fonctionne ?","id_photo":"L42-T2-Q14-C3","usage":"Vérification écran 220 — aiguille NOK","description":"Écran 220 du tableau électrique — aiguille en dessous de 220","type_photo":"Close-up","cadrage":"Frontal serré"}];

var gToken=null,tokenClient=null;
var done={},currentTheme=null,currentQ=null,currentPhoto=null;
var stream=null,snapBlob=null,usingFront=false;
try{done=JSON.parse(localStorage.getItem('sp_done')||'{}');}catch(e){}

window.addEventListener('load',function(){show('screen-auth');});

function show(id){
  ['screen-auth','screen-themes','screen-questions','screen-photos','screen-camera','screen-success'].forEach(function(s){
    var el=document.getElementById(s);
    if(el)el.className='screen wrap'+(s===id?' on':'');
  });
  window.scrollTo(0,0);
}

function connectGoogle(){
  if(!tokenClient){
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:function(resp){
        if(resp.error){alert('Erreur : '+resp.error);return;}
        gToken=resp.access_token;
        buildThemes();show('screen-themes');
      }
    });
  }
  tokenClient.requestAccessToken();
}

function buildThemes(){
  var map={};
  PHOTOS.forEach(function(p){
    if(!map[p.thematique])map[p.thematique]={total:0,done:0};
    map[p.thematique].total++;
    if(done[p.id_photo])map[p.thematique].done++;
  });
  var el=document.getElementById('themes-list');el.innerHTML='';
  Object.keys(map).sort().forEach(function(t){
    var d=map[t];
    var div=document.createElement('div');div.className='card';
    div.innerHTML='<h3>'+t.replace(/_/g,' ')+'</h3><p>'+d.total+' photos à prendre</p><div class="prog">'+d.done+'/'+d.total+' photos faites</div>';
    div.onclick=function(){openTheme(t);};
    el.appendChild(div);
  });
}

function openTheme(t){
  currentTheme=t;
  var map={};
  PHOTOS.filter(function(p){return p.thematique===t;}).forEach(function(p){
    if(!map[p.id_question])map[p.id_question]={q:p.question,type:p.type_question,photos:[]};
    map[p.id_question].photos.push(p);
  });
  var el=document.getElementById('questions-list');
  el.innerHTML='<div style="font-size:11px;color:var(--mu);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">'+t.replace(/_/g,' ')+'</div>';
  Object.keys(map).forEach(function(qid){
    var d=map[qid];
    var nd=d.photos.filter(function(p){return done[p.id_photo];}).length;
    var allDone=nd===d.photos.length;
    var div=document.createElement('div');div.className='q-card'+(allDone?' done':'');
    div.innerHTML='<div class="q-id">'+qid+' · '+d.type+'</div><div class="q-text">'+d.q+'</div><div class="q-progress">'+(allDone?'✅ ':'')+nd+'/'+d.photos.length+' photos</div>';
    div.onclick=function(){openQuestion(qid,d);};
    el.appendChild(div);
  });
  show('screen-questions');
}

function openQuestion(qid,d){
  currentQ=qid;
  document.getElementById('p-title').textContent=qid+' · '+d.type;
  document.getElementById('p-sub').textContent=d.q;
  var el=document.getElementById('photos-list');el.innerHTML='';
  d.photos.forEach(function(p){
    var isDone=done[p.id_photo];
    var div=document.createElement('div');div.className='p-card'+(isDone?' done':'');
    div.innerHTML='<div class="p-id">'+p.id_photo+'</div><div class="p-usage">'+p.usage+'</div><div class="p-desc">'+p.description+'</div><div class="p-status">'+(isDone?'✅ Photo prise':'📷 À photographier')+'</div>';
    div.onclick=function(){openCamera(p);};
    el.appendChild(div);
  });
  show('screen-photos');
}

function openCamera(p){
  currentPhoto=p;
  document.getElementById('cam-photo-id').textContent=p.id_photo;
  document.getElementById('cam-photo-usage').textContent=p.usage;
  document.getElementById('cam-photo-desc').textContent=p.description;
  document.getElementById('errCam').textContent='';
  document.getElementById('upload-status').textContent='';
  snapBlob=null;
  var img=document.getElementById('previewImg');img.style.display='none';img.src='';
  document.getElementById('cam-actions-shoot').style.display='flex';
  document.getElementById('cam-actions-preview').style.display='none';
  show('screen-camera');
  startCam();
}

function backToPhotos(){stopCam();show('screen-photos');}

function startCam(){
  stopCam();
  navigator.mediaDevices.getUserMedia({video:{facingMode:usingFront?'user':'environment',width:{ideal:1920}}})
  .then(function(s){
    stream=s;var v=document.getElementById('vid');v.srcObject=s;v.style.display='block';
  })
  .catch(function(e){document.getElementById('errCam').textContent='Caméra : '+e.message;});
}

function stopCam(){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  var v=document.getElementById('vid');v.style.display='none';v.srcObject=null;
}

function switchCam(){usingFront=!usingFront;startCam();}

function doSnap(){
  var v=document.getElementById('vid');
  var c=document.getElementById('snapCanvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  stopCam();
  c.toBlob(function(blob){
    snapBlob=blob;
    var img=document.getElementById('previewImg');
    img.src=URL.createObjectURL(blob);img.style.display='block';
    document.getElementById('cam-actions-shoot').style.display='none';
    document.getElementById('cam-actions-preview').style.display='block';
  },'image/jpeg',0.92);
}

function retake(){
  var img=document.getElementById('previewImg');img.style.display='none';img.src='';
  snapBlob=null;
  document.getElementById('cam-actions-shoot').style.display='flex';
  document.getElementById('cam-actions-preview').style.display='none';
  document.getElementById('upload-status').textContent='';
  startCam();
}

function sendPhoto(){
  if(!snapBlob){alert('Pas de photo');return;}
  if(!gToken){alert('Non connecté à Drive');return;}
  var btn=document.getElementById('btn-send');
  btn.disabled=true;btn.textContent='⏳ Envoi…';
  document.getElementById('upload-status').textContent='Envoi en cours…';
  var filename=currentPhoto.id_photo+'.jpg';
  var folderId=DRIVE_FOLDERS[currentPhoto.thematique]||null;
  var meta={name:filename,mimeType:'image/jpeg'};
  if(folderId)meta.parents=[folderId];
  var form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',snapBlob);
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{Authorization:'Bearer '+gToken},body:form
  })
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(){
    done[currentPhoto.id_photo]=true;
    localStorage.setItem('sp_done',JSON.stringify(done));
    btn.disabled=false;btn.textContent='☁️ Envoyer';
    document.getElementById('success-msg').textContent=filename+' → Drive / '+currentPhoto.thematique.replace(/_/g,' ');
    show('screen-success');
  })
  .catch(function(e){
    btn.disabled=false;btn.textContent='☁️ Envoyer';
    document.getElementById('upload-status').textContent='❌ Erreur : '+e.message;
  });
}

function afterSuccess(){
  var map={};
  PHOTOS.filter(function(p){return p.thematique===currentTheme;}).forEach(function(p){
    if(!map[p.id_question])map[p.id_question]={q:p.question,type:p.type_question,photos:[]};
    map[p.id_question].photos.push(p);
  });
  if(currentQ&&map[currentQ]){openQuestion(currentQ,map[currentQ]);}
  else{show('screen-photos');}
}
</script>
</body>
</html>

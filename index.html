<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f2f2f7;min-height:100vh}
.screen{display:none;padding-bottom:40px}
.screen.active{display:block}
.topbar{background:#fff;border-bottom:0.5px solid #c6c6c8;padding:12px 16px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:17px;font-weight:600;color:#000}
.topbar-sub{font-size:13px;color:#6e6e73;margin-top:2px}
.back-btn{background:none;border:none;color:#007AFF;font-size:17px;cursor:pointer;padding:0}
.section-title{font-size:13px;font-weight:500;color:#6e6e73;text-transform:uppercase;letter-spacing:0.05em;padding:20px 16px 6px}
.theme-card{background:#fff;border-radius:12px;margin:0 16px 10px;padding:14px 16px;cursor:pointer}
.theme-card:active{opacity:0.7}
.theme-row{display:flex;justify-content:space-between;align-items:center}
.theme-name{font-size:15px;font-weight:500;color:#000}
.theme-badge{font-size:12px;padding:3px 9px;border-radius:99px;background:#e8f4ff;color:#007AFF;font-weight:500}
.theme-badge.done{background:#e8f8ee;color:#34C759}
.progress-track{height:3px;background:#e5e5ea;border-radius:2px;margin-top:10px}
.progress-bar{height:100%;background:#007AFF;border-radius:2px}
.q-card{background:#fff;border-radius:12px;margin:0 16px 10px;padding:14px 16px;cursor:pointer}
.q-card:active{opacity:0.7}
.q-text{font-size:14px;color:#000;line-height:1.45}
.q-meta{display:flex;gap:6px;margin-top:8px;align-items:center}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;background:#f2f2f7;color:#6e6e73}
.badge.diag{background:#fff0ee;color:#c0392b}
.badge.step{background:#e8f4ff;color:#007AFF}
.badge.info{background:#e8f8ee;color:#34C759}
.q-progress{font-size:11px;color:#6e6e73;margin-left:auto}
.photo-card{background:#fff;border-radius:12px;margin:0 16px 12px;overflow:hidden}
.photo-card.done{border:1.5px solid #34C759}
.photo-header{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.photo-id{font-family:'SF Mono',monospace;font-size:12px;font-weight:600;padding:4px 9px;background:#e8f4ff;color:#007AFF;border-radius:6px;white-space:nowrap;margin-top:1px}
.photo-id.done{background:#e8f8ee;color:#34C759}
.photo-info{flex:1}
.photo-usage{font-size:14px;font-weight:500;color:#000}
.photo-desc{font-size:12px;color:#6e6e73;margin-top:3px;line-height:1.4}
.photo-tags{display:flex;gap:6px;padding:8px 16px 12px;border-top:0.5px solid #c6c6c8}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;background:#fff3e0;color:#e65100}
.photo-actions{padding:0 16px 14px;display:flex;gap:8px}
.btn-camera{flex:1;padding:11px;background:#007AFF;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.btn-skip{padding:11px 14px;background:#f2f2f7;color:#6e6e73;border:none;border-radius:10px;font-size:13px;cursor:pointer}
.photo-done-label{padding:0 16px 6px;font-size:12px;color:#34C759;font-weight:500}
.photo-done-actions{padding:0 16px 12px}
.btn-replace{width:100%;padding:9px;background:#f2f2f7;color:#FF9500;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer}
.preview-resolution{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;margin-top:4px}

/* CAMERA */
#cameraScreen{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
#cameraScreen.active{display:flex}
#video{width:100%;flex:1;object-fit:cover;min-height:0}
.cam-overlay{position:fixed;top:0;left:0;right:0;padding:50px 16px 14px;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);z-index:5}
.cam-id{font-family:'SF Mono',monospace;font-size:14px;color:#64b5f6;font-weight:600}
.cam-desc{font-size:13px;color:rgba(255,255,255,0.85);margin-top:4px;line-height:1.4}
.cam-type{display:inline-block;margin-top:6px;font-size:11px;padding:3px 9px;background:rgba(255,149,0,0.3);color:#ffcc80;border-radius:99px}
.cam-bottom{position:fixed;bottom:0;left:0;right:0;padding:20px 32px 100px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.85);z-index:10}
.shutter{width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:rgba(255,255,255,0.9);cursor:pointer;flex-shrink:0}
.shutter:active{transform:scale(0.92)}
.cam-cancel{color:#fff;background:none;border:none;font-size:16px;cursor:pointer;min-width:60px}
.cam-flip{color:#fff;background:none;border:none;font-size:26px;cursor:pointer;min-width:60px;text-align:right}

/* PREVIEW */
#previewScreen{display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column}
#previewScreen.active{display:flex}
#previewImg{width:100%;flex:1;object-fit:contain;min-height:0}
.preview-top{padding:50px 16px 10px;text-align:center;background:rgba(0,0,0,0.7);position:fixed;top:0;left:0;right:0}
.preview-filename{font-family:'SF Mono',monospace;font-size:13px;color:#64b5f6}
.preview-bottom{position:fixed;bottom:0;left:0;right:0;padding:16px 20px 80px;display:flex;gap:12px;background:#111}
.btn-retake{flex:1;padding:13px;border:1px solid rgba(255,255,255,0.3);background:none;color:#fff;border-radius:12px;font-size:14px;cursor:pointer}
.btn-save{flex:2;padding:13px;background:#007AFF;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save:active{opacity:0.8}

/* UPLOAD STATUS */
#uploadScreen{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px}
#uploadScreen.active{display:flex}
.upload-icon{font-size:48px}
.upload-title{color:#fff;font-size:18px;font-weight:600;text-align:center}
.upload-sub{color:rgba(255,255,255,0.6);font-size:14px;text-align:center;line-height:1.5}
.upload-filename{font-family:'SF Mono',monospace;font-size:13px;color:#64b5f6;text-align:center}
.upload-progress{width:100%;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden}
.upload-bar{height:100%;background:#007AFF;border-radius:2px;transition:width 0.3s;width:0%}
.btn-upload-ok{padding:14px 32px;background:#34C759;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:none}
.btn-upload-retry{padding:14px 32px;background:#FF3B30;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:none}

/* AUTH */
#authScreen{display:none;position:fixed;inset:0;z-index:500;background:#f2f2f7;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px}
#authScreen.active{display:flex}
.auth-title{font-size:22px;font-weight:700;color:#000;text-align:center}
.auth-sub{font-size:14px;color:#6e6e73;text-align:center;line-height:1.5}
.btn-auth{padding:16px 32px;background:#007AFF;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:300px}

canvas{display:none}
</style>
</head>
<body>

<div id="screen-themes" class="screen active">
  <div class="topbar">
    <div class="topbar-title">Régiesseur photo v4</div>
    <div class="topbar-sub" id="auth-status">Sailoé — Lagoon 42</div>
  </div>
  <div class="section-title">Thématiques</div>
  <div id="themes-list"></div>
</div>

<div id="screen-questions" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showThemes()">&#8249; Thématiques</button>
    <div class="topbar-sub" id="q-sub"></div>
  </div>
  <div class="section-title">Questions</div>
  <div id="questions-list"></div>
</div>

<div id="screen-photos" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showQuestions()">&#8249; Questions</button>
    <div class="topbar-title" id="p-title"></div>
    <div class="topbar-sub" id="p-sub"></div>
  </div>
  <div id="photos-list"></div>
</div>

<div id="cameraScreen">

    <div class="cam-id" id="cam-id"></div>
    <div class="cam-desc" id="cam-desc"></div>
    <span class="cam-type" id="cam-type"></span>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-bottom">
    <button class="cam-cancel" onclick="closeCamera()">Annuler</button>
    <button class="shutter" onclick="takePhoto()"></button>
    <button class="cam-flip" onclick="flipCamera()">&#8635;</button>
  </div>
</div>

<div id="previewScreen">
  <div class="preview-top">
    <div class="preview-filename" id="preview-filename"></div>
    <div class="preview-resolution" id="preview-resolution"></div>
  </div>
  <img id="previewImg" src=""/>
  <div class="preview-bottom">
    <button class="btn-retake" onclick="retake()">Reprendre</button>
    <button class="btn-save" onclick="uploadToDrive()">Envoyer vers Drive</button>
  </div>
</div>

<div id="uploadScreen">
  <div class="upload-icon" id="upload-icon">☁️</div>
  <div class="upload-title" id="upload-title">Envoi en cours...</div>
  <div class="upload-filename" id="upload-filename"></div>
  <div class="upload-progress"><div class="upload-bar" id="upload-bar"></div></div>
  <div class="upload-sub" id="upload-sub">Connexion à Google Drive</div>
  <button class="btn-upload-ok" id="btn-ok" onclick="uploadDone()">Parfait ✓</button>
  <button class="btn-upload-retry" id="btn-retry" onclick="retryUpload()">Réessayer</button>
</div>

<div id="authScreen">
  <div class="auth-title">Connexion Google Drive</div>
  <div class="auth-sub">Pour envoyer les photos directement dans les bons dossiers Drive, connecte ton compte Google.</div>
  <button class="btn-auth" onclick="signIn()">Se connecter avec Google</button>
</div>

<canvas id="canvas"></canvas>

function themes(){

    m[p.thematique].total++;
    if(done[p.id_photo])m[p.thematique].done++;

}

function showQuestions(t){
  if(t)currentTheme=t;
  show('screen-questions');
  document.getElementById('q-sub').textContent=currentTheme.replace(/_/g,' ');
  const el=document.getElementById('questions-list');
  el.innerHTML='';
  Object.entries(questions(currentTheme)).forEach(([qId,d])=>{
    const nd=d.photos.filter(p=>done[p.id_photo]).length;
    const tc=d.type==='Diagnostic'?'diag':d.type==='Step by step'?'step':'info';
    el.innerHTML+=`<div class="q-card" onclick="showPhotos('${qId}')">
      <div class="q-text">${d.q}</div>
      <div class="q-meta">
        <span class="badge ${tc}">${d.type}</span>
        <span class="q-progress">${nd}/${d.photos.length} photos</span>
      </div>
    </div>`;
  });
}
function showPhotos(qId){
  if(qId)currentQ=qId;
  show('screen-photos');
  const qs=questions(currentTheme);
  const d=qs[currentQ];
  document.getElementById('p-title').textContent=currentQ;
  document.getElementById('p-sub').textContent=d.photos.length+' photos à prendre';
  const el=document.getElementById('photos-list');
  el.innerHTML='';
  d.photos.forEach(p=>{
    const isDone=!!done[p.id_photo];
    el.innerHTML+=`<div class="photo-card${isDone?' done':''}" id="pc-${p.id_photo}">
      <div class="photo-header">
        <span class="photo-id${isDone?' done':''}">${p.id_photo}</span>
        <div class="photo-info">
          <div class="photo-usage">${p.usage}</div>
          <div class="photo-desc">${p.description}</div>
        </div>
      </div>
      <div class="photo-tags">
        <span class="tag">${p.type_photo}</span>
        <span class="tag">${p.cadrage}</span>
      </div>
      ${isDone
        ?`<div class="photo-done-label">✓ Envoyée dans Drive</div>
        <div class="photo-done-actions">
          <button class="btn-replace" onclick="replacePhoto('${p.id_photo}')">🔄 Remplacer</button>
        </div>`
        :`<div class="photo-actions">
            <button class="btn-camera" onclick="openCamera('${p.id_photo}')">Prendre la photo</button>
            <button class="btn-skip" onclick="markDone('${p.id_photo}')">Déjà prise</button>
          </div>`}
    </div>`;
  });
}
function markDone(id){done[id]=true;save();window._checkedState[id]=true;saveState(window._checkedState);showPhotos();}
function replacePhoto(id){
  const p=PHOTOS.find(x=>x.id_photo===id);
  if(!p)return;
  // Rouvrir la caméra — l'upload écrasera le fichier Drive existant
  openCamera(id);
}

// GOOGLE AUTH
const REDIRECT_URI='https://francktami-bot.github.io/regisseur-sailoe';
function signIn(){
  const params=new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:REDIRECT_URI,
    response_type:'token',
    scope:SCOPES,
    prompt:'consent'
  });
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params;
}
function checkAuth(){
  const hash=new URLSearchParams(window.location.hash.slice(1));
  if(hash.get('access_token')){
    accessToken=hash.get('access_token');
    try{localStorage.setItem('sp_token',accessToken)}catch(e){}
    window.history.replaceState(null,'',window.location.pathname);
  }
}
function ensureAuth(cb){
  if(accessToken){cb();return;}
  document.getElementById('authScreen').classList.add('active');
  window._pendingCb=cb;
}

// CAMERA
async function openCamera(id){
  const p=PHOTOS.find(x=>x.id_photo===id);
  if(!p)return;
  currentPhoto=p;
  document.getElementById('cam-id').textContent=id;
  document.getElementById('cam-desc').textContent=p.description;
  document.getElementById('cam-type').textContent=p.type_photo+' — '+p.cadrage;
  document.getElementById('cameraScreen').classList.add('active');
  await startStream();
}
async function startStream(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:usingFront?'user':'environment',width:{ideal:3840},height:{ideal:2160}}
    });
    document.getElementById('video').srcObject=stream;
  }catch(e){
    alert('Caméra non disponible : '+e.message);
    closeCamera();
  }
}
function flipCamera(){usingFront=!usingFront;startStream();}
function closeCamera(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  stream=null;
  document.getElementById('cameraScreen').classList.remove('active');
}
function takePhoto(){
  const v=document.getElementById('video');
  const c=document.getElementById('canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(b=>{
    blob=b;
    const url=URL.createObjectURL(b);
    document.getElementById('previewImg').src=url;
    document.getElementById('preview-filename').textContent=currentPhoto.id_photo+'.jpg';
    document.getElementById('preview-resolution').textContent=c.width+'×'+c.height+' px';
    closeCamera();
    document.getElementById('previewScreen').classList.add('active');
  },'image/jpeg',0.92);
}
function retake(){
  document.getElementById('previewScreen').classList.remove('active');
  blob=null;
  usingFront=false;
  openCamera(currentPhoto.id_photo);
}

// UPLOAD DRIVE
async function uploadToDrive(){
  if(!blob||!currentPhoto)return;
  document.getElementById('previewScreen').classList.remove('active');
  if(!accessToken){
    showUploadScreen('🔐','Connexion requise','Connecte ton compte Google pour envoyer vers Drive','');
    document.getElementById('btn-ok').style.display='none';
    document.getElementById('btn-retry').style.display='none';
    document.getElementById('authScreen').classList.add('active');
    return;
  }
  await doUpload();
}

async function doUpload(){
  const filename=currentPhoto.id_photo+'.jpg';
  const folderId=DRIVE_FOLDERS[currentPhoto.thematique]||null;

  showUploadScreen('☁️','Envoi en cours...',`Dossier : ${currentPhoto.thematique.replace(/_/g,' ')}`,filename);
  animateBar(0,60,1500);

  try{
    // Chercher si le fichier existe déjà dans le dossier Drive
    let existingId=null;
    if(folderId){
      const q=encodeURIComponent(`name='${filename}' and '${folderId}' in parents and trashed=false`);
      const searchResp=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
        headers:{Authorization:'Bearer '+accessToken}
      });
      if(searchResp.ok){
        const searchData=await searchResp.json();
        if(searchData.files&&searchData.files.length>0)existingId=searchData.files[0].id;
      }
    }

    let resp;
    if(existingId){
      // UPDATE — écraser le fichier existant
      const metadata={name:filename,mimeType:'image/jpeg'};
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob,filename);
      resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`,{
        method:'PATCH',
        headers:{Authorization:'Bearer '+accessToken},
        body:form
      });
    } else {
      // CREATE — nouveau fichier
      const metadata={name:filename,mimeType:'image/jpeg'};
      if(folderId)metadata.parents=[folderId];
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
      form.append('file',blob,filename);
      resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{Authorization:'Bearer '+accessToken},
        body:form
      });
    }

    if(resp.status===401){
      accessToken=null;
      try{localStorage.removeItem('sp_token')}catch(e){}
      showUploadScreen('🔐','Session expirée','Reconnecte-toi à Google','');
      document.getElementById('btn-retry').textContent='Se reconnecter';
      document.getElementById('btn-retry').style.display='block';
      document.getElementById('btn-retry').onclick=signIn;
      return;
    }

    if(!resp.ok)throw new Error('Erreur '+resp.status);

    animateBar(60,100,500);
    setTimeout(()=>{
      const label=existingId?'Photo remplacée ✓':'Photo envoyée !';
      showUploadScreen('✅',label,`Dans Drive → ${currentPhoto.thematique.replace(/_/g,' ')}`,filename);
      document.getElementById('upload-bar').style.width='100%';
      document.getElementById('btn-ok').style.display='block';
    },600);

    done[currentPhoto.id_photo]=true;
    save();

  }catch(e){
    showUploadScreen('❌','Échec de l\'envoi',e.message||'Vérifie ta connexion',filename);
    document.getElementById('btn-retry').style.display='block';
    document.getElementById('btn-retry').textContent='Réessayer';
    document.getElementById('btn-retry').onclick=doUpload;
  }
}

function showUploadScreen(icon,title,sub,filename){
  document.getElementById('upload-icon').textContent=icon;
  document.getElementById('upload-title').textContent=title;
  document.getElementById('upload-sub').textContent=sub;
  document.getElementById('upload-filename').textContent=filename;
  document.getElementById('upload-bar').style.width='0%';
  document.getElementById('btn-ok').style.display='none';
  document.getElementById('btn-retry').style.display='none';
  document.getElementById('uploadScreen').classList.add('active');
}
function animateBar(from,to,duration){
  const bar=document.getElementById('upload-bar');
  const start=Date.now();
  function step(){
    const p=Math.min(1,(Date.now()-start)/duration);
    bar.style.width=(from+(to-from)*p)+'%';
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function uploadDone(){
  document.getElementById('uploadScreen').classList.remove('active');
  if(currentPhoto){done[currentPhoto]=true;save();window._checkedState[currentPhoto]=true;saveState(window._checkedState);}
  blob=null;
  showPhotos();
}
function retryUpload(){doUpload();}

checkAuth();
showThemes();
</script>



<div id="tokenBanner" style="display:none;position:fixed;top:0;left:0;right:0;background:#1B3A5C;color:#fff;padding:14px;z-index:9999;font-size:14px;">
  <div style="margin-bottom:8px;font-weight:bold;">🔑 Token GitHub requis pour sauvegarder l'état des photos</div>
  <input id="tokenInput" type="password" placeholder="ghp_xxx..." style="width:100%;padding:8px;border-radius:6px;border:none;font-size:13px;margin-bottom:8px;">
  <button onclick="saveToken()" style="background:#27AE60;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:14px;font-weight:bold;">Enregistrer</button>
</div>

<script>
// ── PERSISTANCE ÉTAT PHOTOS ──────────────────────────────
const GH_REPO = "francktami-bot/regisseur-sailoe";
const GH_FILE = "state.json";
const GH_API  = "https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE;
window._ghSha = null;
window._checkedState = {};

function getToken() {
  return localStorage.getItem('regisseur_gh_token') || '';
}

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t.startsWith('ghp_')) { alert('Token invalide — doit commencer par ghp_'); return; }
  localStorage.setItem('regisseur_gh_token', t);
  document.getElementById('tokenBanner').style.display = 'none';
  initCheckedState();
}

async function loadState() {
  const token = getToken();
  if (!token) { document.getElementById('tokenBanner').style.display = 'block'; return {}; }
  try {
    const r = await fetch(GH_API, { headers: { Authorization: "token " + token } });
    if (r.status === 404) return {};
    if (!r.ok) { localStorage.removeItem('regisseur_gh_token'); document.getElementById('tokenBanner').style.display = 'block'; return {}; }
    const j = await r.json();
    window._ghSha = j.sha;
    return JSON.parse(atob(j.content.replace(/\n/g,'')));
  } catch(e) { return {}; }
}

async function saveState(checkedIds) {
  const token = getToken();
  if (!token) return;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(checkedIds))));
  const body = { message: "update state", content: content };
  if (window._ghSha) body.sha = window._ghSha;
  try {
    const r = await fetch(GH_API, {
      method: "PUT",
      headers: { Authorization: "token " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (j.content) window._ghSha = j.content.sha;
  } catch(e) { console.error("saveState error", e); }
}

async function initCheckedState() {
  const state = await loadState();
  window._checkedState = state || {};
  Object.keys(window._checkedState).forEach(id => {
    if (window._checkedState[id]) {
      const cb = document.querySelector('input[data-id="' + id + '"]');
      if (cb) { cb.checked = true; cb.closest('li').classList.add('done'); }
    }
  });
  if (typeof updateCounters === 'function') updateCounters();
}

async function togglePhoto(cb) {
  const id = cb.dataset.id;
  const li = cb.closest('li');
  if (cb.checked) {
    li.classList.add('done');
    window._checkedState[id] = true;
  } else {
    li.classList.remove('done');
    delete window._checkedState[id];
  }
  if (typeof updateCounters === 'function') updateCounters();
  await saveState(window._checkedState);
}

window.addEventListener('load', initCheckedState);
// ── FIN PERSISTANCE ──────────────────────────────────────
</script>

</body>
